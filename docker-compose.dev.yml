version: '3.8'

services:


  # Redis for Development
  redis:
    image: redis:7-alpine
    container_name: recipehub-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - recipehub-dev-network

  # Backend Development (with hot reload)
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: recipehub-api-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: file:./dev.db
      JWT_SECRET: dev-jwt-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    networks:
      - recipehub-dev-network

  # Frontend Development (with hot reload)
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: recipehub-web-dev
    restart: unless-stopped
    environment:
      # Remove VITE_API_URL to enable automatic port detection
      NODE_ENV: development
    ports:
      - "5173:5173"
    depends_on:
      - backend-dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./.port:/app/public/.port:ro  # Share port file with frontend
    networks:
      - recipehub-dev-network

volumes:
  redis_dev_data:
    driver: local

networks:
  recipehub-dev-network:
    driver: bridge