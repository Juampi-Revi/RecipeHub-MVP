version: '3.8'

services:
  # PostgreSQL Database for Development
  database:
    image: postgres:15-alpine
    container_name: recipehub-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: recipehub_dev
      POSTGRES_USER: recipehub_user
      POSTGRES_PASSWORD: recipehub_password
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipehub_user -d recipehub_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - recipehub-dev-network

  # Redis for Development
  redis:
    image: redis:7-alpine
    container_name: recipehub-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - recipehub-dev-network

  # Backend Development (with hot reload)
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: recipehub-api-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://recipehub_user:recipehub_password@database:5432/recipehub_dev
      JWT_SECRET: dev-jwt-secret
      JWT_REFRESH_SECRET: dev-refresh-secret
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    networks:
      - recipehub-dev-network

  # Frontend Development (with hot reload)
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: recipehub-web-dev
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "5173:5173"
    depends_on:
      - backend-dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - recipehub-dev-network

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  recipehub-dev-network:
    driver: bridge