<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pizzaBase" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffd54f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb74d;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="tomatoSauce" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#ff5722;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d84315;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="cheese" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#fff8e1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffecb3;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="saladGreen" cx="30%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#66bb6a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#388e3c;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="plateGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f5f5;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#fafafa"/>
  
  <!-- Table surface -->
  <ellipse cx="200" cy="280" rx="190" ry="18" fill="#e0e0e0" opacity="0.3"/>
  
  <!-- Pizza Plate (Left) -->
  <g transform="translate(120,180)">
    <!-- Plate -->
    <ellipse cx="0" cy="0" rx="60" ry="12" fill="url(#plateGrad)" stroke="#e0e0e0" stroke-width="1"/>
    <ellipse cx="0" cy="-3" rx="58" ry="11" fill="url(#plateGrad)"/>
    
    <!-- Pizza base -->
    <ellipse cx="0" cy="-3" rx="45" ry="8" fill="url(#pizzaBase)"/>
    
    <!-- Tomato sauce -->
    <ellipse cx="0" cy="-4" rx="40" ry="7" fill="url(#tomatoSauce)" opacity="0.8"/>
    
    <!-- Cheese -->
    <ellipse cx="0" cy="-5" rx="38" ry="6" fill="url(#cheese)" opacity="0.9"/>
    
    <!-- Pepperoni -->
    <circle cx="-15" cy="-8" r="4" fill="#c62828"/>
    <circle cx="10" cy="-6" r="3" fill="#c62828"/>
    <circle cx="-5" cy="-2" r="3" fill="#c62828"/>
    <circle cx="20" cy="-4" r="3" fill="#c62828"/>
    
    <!-- Basil -->
    <g transform="translate(-10,-8)">
      <path d="M0,0 Q2,-1 4,0 Q2,3 0,2 Q-2,3 -4,0 Q-2,-1 0,0" fill="#2e7d32"/>
    </g>
    <g transform="translate(15,-5)">
      <path d="M0,0 Q1,-1 2,0 Q1,2 0,1 Q-1,2 -2,0 Q-1,-1 0,0" fill="#2e7d32"/>
    </g>
  </g>
  
  <!-- Salad Bowl (Right) -->
  <g transform="translate(280,170)">
    <!-- Bowl -->
    <ellipse cx="0" cy="5" rx="50" ry="10" fill="#8d6e63" opacity="0.3"/>
    <ellipse cx="0" cy="0" rx="50" ry="25" fill="url(#plateGrad)" stroke="#e0e0e0" stroke-width="1"/>
    <ellipse cx="0" cy="-5" rx="48" ry="23" fill="url(#plateGrad)"/>
    
    <!-- Salad leaves -->
    <g transform="translate(0,-10)">
      <!-- Lettuce -->
      <path d="M-20,-5 Q-15,-10 -10,-5 Q-15,0 -20,-5" fill="url(#saladGreen)"/>
      <path d="M-5,-8 Q0,-12 5,-8 Q0,-3 -5,-8" fill="url(#saladGreen)"/>
      <path d="M10,-6 Q15,-10 20,-6 Q15,-1 10,-6" fill="url(#saladGreen)"/>
      <path d="M-10,2 Q-5,-2 0,2 Q-5,7 -10,2" fill="url(#saladGreen)"/>
      <path d="M5,0 Q10,-4 15,0 Q10,5 5,0" fill="url(#saladGreen)"/>
      
      <!-- Cherry tomatoes -->
      <circle cx="-8" cy="-2" r="3" fill="#f44336"/>
      <circle cx="12" cy="1" r="2" fill="#f44336"/>
      
      <!-- Cucumber -->
      <ellipse cx="0" cy="3" rx="8" ry="2" fill="#4caf50"/>
      <ellipse cx="-15" cy="5" rx="6" ry="2" fill="#4caf50"/>
    </g>
  </g>
  
  <!-- Burger (Center Back) -->
  <g transform="translate(200,140)">
    <!-- Plate -->
    <ellipse cx="0" cy="15" rx="45" ry="8" fill="url(#plateGrad)" stroke="#e0e0e0" stroke-width="1"/>
    
    <!-- Bottom bun -->
    <ellipse cx="0" cy="10" rx="25" ry="6" fill="#d4af37"/>
    
    <!-- Lettuce -->
    <ellipse cx="0" cy="5" rx="23" ry="3" fill="#4caf50"/>
    
    <!-- Patty -->
    <ellipse cx="0" cy="2" rx="22" ry="4" fill="#8d4e2a"/>
    
    <!-- Cheese -->
    <ellipse cx="0" cy="-1" rx="24" ry="3" fill="#ffc107"/>
    
    <!-- Tomato -->
    <ellipse cx="0" cy="-4" rx="20" ry="2" fill="#f44336"/>
    
    <!-- Top bun -->
    <ellipse cx="0" cy="-8" rx="25" ry="6" fill="#d4af37"/>
    
    <!-- Sesame seeds -->
    <circle cx="-8" cy="-10" r="1" fill="#fff"/>
    <circle cx="5" cy="-9" r="1" fill="#fff"/>
    <circle cx="-3" cy="-11" r="1" fill="#fff"/>
    <circle cx="10" cy="-8" r="1" fill="#fff"/>
  </g>
  
  <!-- Floating rating stars -->
  <g opacity="0.8">
    <g transform="translate(80,100)">
      <path d="M0,-8 L2,-2 L8,-2 L3,2 L5,8 L0,4 L-5,8 L-3,2 L-8,-2 L-2,-2 Z" fill="#ffc107">
        <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
      </path>
    </g>
    <g transform="translate(320,90)">
      <path d="M0,-6 L1.5,-1.5 L6,-1.5 L2.25,1.5 L3.75,6 L0,3 L-3.75,6 L-2.25,1.5 L-6,-1.5 L-1.5,-1.5 Z" fill="#ffc107">
        <animate attributeName="opacity" values="1;0.8;1" dur="2.5s" repeatCount="indefinite"/>
      </path>
    </g>
    <g transform="translate(350,120)">
      <path d="M0,-5 L1,-1 L5,-1 L2,1 L3,5 L0,2.5 L-3,5 L-2,1 L-5,-1 L-1,-1 Z" fill="#ffc107">
        <animate attributeName="opacity" values="0.8;1;0.8" dur="1.8s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
  
  <!-- Heart reactions -->
  <g opacity="0.7">
    <g transform="translate(150,80)">
      <path d="M0,5 C-5,0 -10,0 -10,5 C-10,10 0,15 0,15 C0,15 10,10 10,5 C10,0 5,0 0,5 Z" fill="#e91e63">
        <animateTransform attributeName="transform" type="translate" dur="3s" repeatCount="indefinite" 
                          values="0,0; 0,-10; 0,0"/>
        <animate attributeName="opacity" dur="3s" repeatCount="indefinite" 
                 values="0.7; 1; 0.7"/>
      </path>
    </g>
    <g transform="translate(250,70)">
      <path d="M0,3 C-3,0 -6,0 -6,3 C-6,6 0,9 0,9 C0,9 6,6 6,3 C6,0 3,0 0,3 Z" fill="#e91e63">
        <animateTransform attributeName="transform" type="translate" dur="4s" repeatCount="indefinite" 
                          values="0,0; 0,-8; 0,0"/>
        <animate attributeName="opacity" dur="4s" repeatCount="indefinite" 
                 values="0.7; 1; 0.7"/>
      </path>
    </g>
  </g>
  
  <!-- Steam from hot food -->
  <g opacity="0.4">
    <path d="M200,120 Q205,110 200,100 Q195,90 200,80" stroke="#ffffff" stroke-width="2" fill="none">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M120,160 Q125,150 120,140 Q115,130 120,120" stroke="#ffffff" stroke-width="1.5" fill="none">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Recipe cards floating -->
  <g opacity="0.6">
    <g transform="translate(50,200)">
      <rect x="0" y="0" width="30" height="20" rx="2" fill="#fff" stroke="#e0e0e0"/>
      <rect x="2" y="2" width="26" height="3" fill="#ff5722"/>
      <line x1="3" y1="8" x2="27" y2="8" stroke="#666" stroke-width="0.5"/>
      <line x1="3" y1="11" x2="25" y2="11" stroke="#666" stroke-width="0.5"/>
      <line x1="3" y1="14" x2="23" y2="14" stroke="#666" stroke-width="0.5"/>
      <animateTransform attributeName="transform" type="translate" dur="6s" repeatCount="indefinite" 
                        values="0,0; 5,-5; 0,0"/>
    </g>
    <g transform="translate(320,210)">
      <rect x="0" y="0" width="25" height="18" rx="2" fill="#fff" stroke="#e0e0e0"/>
      <rect x="1" y="1" width="23" height="3" fill="#4caf50"/>
      <line x1="2" y1="7" x2="22" y2="7" stroke="#666" stroke-width="0.5"/>
      <line x1="2" y1="10" x2="20" y2="10" stroke="#666" stroke-width="0.5"/>
      <line x1="2" y1="13" x2="18" y2="13" stroke="#666" stroke-width="0.5"/>
      <animateTransform attributeName="transform" type="translate" dur="5s" repeatCount="indefinite" 
                        values="0,0; -3,-3; 0,0"/>
    </g>
  </g>
</svg>