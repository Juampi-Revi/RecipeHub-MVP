<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Pizza Base -->
  <circle cx="200" cy="200" r="180" fill="#F4A261" stroke="#E76F51" stroke-width="4"/>
  
  <!-- Cheese -->
  <circle cx="200" cy="200" r="170" fill="#FFE66D" opacity="0.8"/>
  
  <!-- Tomato Sauce -->
  <circle cx="200" cy="200" r="160" fill="#E63946" opacity="0.6"/>
  
  <!-- Pepperoni Slices -->
  <circle cx="150" cy="150" r="20" fill="#8B0000"/>
  <circle cx="250" cy="140" r="18" fill="#8B0000"/>
  <circle cx="180" cy="220" r="22" fill="#8B0000"/>
  <circle cx="260" cy="200" r="19" fill="#8B0000"/>
  <circle cx="140" cy="240" r="21" fill="#8B0000"/>
  <circle cx="220" cy="280" r="20" fill="#8B0000"/>
  
  <!-- Mushrooms -->
  <ellipse cx="120" cy="180" rx="15" ry="12" fill="#8B4513"/>
  <ellipse cx="280" cy="160" rx="14" ry="11" fill="#8B4513"/>
  <ellipse cx="200" cy="120" rx="16" ry="13" fill="#8B4513"/>
  <ellipse cx="160" cy="280" rx="15" ry="12" fill="#8B4513"/>
  
  <!-- Green Peppers -->
  <path d="M240 240 Q250 230 260 240 Q250 250 240 240" fill="#228B22"/>
  <path d="M130 200 Q140 190 150 200 Q140 210 130 200" fill="#228B22"/>
  <path d="M200 160 Q210 150 220 160 Q210 170 200 160" fill="#228B22"/>
  
  <!-- Cheese Strings -->
  <path d="M180 180 Q190 170 200 180 Q210 170 220 180" stroke="#FFFACD" stroke-width="3" fill="none"/>
  <path d="M160 220 Q170 210 180 220 Q190 210 200 220" stroke="#FFFACD" stroke-width="3" fill="none"/>
  
  <!-- Crust Highlights -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#D2691E" stroke-width="2" opacity="0.7"/>
  <circle cx="200" cy="200" r="175" fill="none" stroke="#F4A261" stroke-width="1" opacity="0.5"/>
</svg>